[build-system]
requires = ["uv_build>=0.11.2,<0.12.0"]
build-backend = "uv_build"

[project]
name = "optimus"
version = "0.1.0"
description = ""
requires-python = "<3.15,>=3.10"
readme = "README.md"
license = "Apache-2.0"
dependencies = [
    # OA / open-aea / plugins — pinned exactly (framework contract).
    "open-autonomy[cli]==0.21.19",
    "open-aea-test-autonomy==0.21.19",
    "open-aea-helpers==0.21.19",
    "open-aea==2.2.1",
    "open-aea-ledger-ethereum==2.2.1",
    "open-aea-ledger-cosmos==2.2.1",
    # App-repo: all other deps pinned exactly. The few ranges below mirror the
    # ranges declared on third-party YAMLs synced into this repo, where the
    # check-dependencies AEA helper requires the pyproject form to satisfy
    # the YAML range (aiohttp/py-ecc/ecdsa/jsonschema/asn1crypto/protobuf).
    "typing_extensions==4.15.0",
    "gql[requests]==3.5.0",
    "grpcio==1.78.0",
    "asn1crypto<1.5.0,>=1.4.0",
    "py-ecc==8.0.0",
    "pytz==2022.2.1",
    "openapi-core==0.22.0",
    "openapi-spec-validator==0.7.2",
    "jsonschema<5.0.0,>=4.23.0",
    "hypothesis==6.21.6",
    "requests==2.32.5",
    "pyinstaller==6.19.0",
    "pycoingecko==3.2.0",
    "numpy==2.2.6",
    "pandas==2.3.3",
    "peewee==3.17.5",
    "google-generativeai==0.8.2",
    "w3multicall==0.3.1",
    "pydantic==2.13.0b3",
    "multiaddr==0.0.9",
    "protobuf<6,>=5",
    "pycryptodome==3.20.0",
    "certifi==2026.2.25",
    "hexbytes==2.0.0b1",
    "pip==26.0.1",
]

[project.urls]
Repository = "https://github.com/valory-xyz/optimus"

[dependency-groups]
dev = [
    "tomte[cli, tests]>=0.6.5",
]

[tool.uv]
default-groups = "all"
prerelease = "allow"

[tool.uv.build-backend]
module-name = ["packages"]
module-root = ""
