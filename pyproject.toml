[build-system]
requires = ["uv_build>=0.11.2,<0.12.0"]
build-backend = "uv_build"

[project]
name = "optimus"
version = "0.1.0"
description = ""
requires-python = "<3.15,>=3.10"
readme = "README.md"
license = "Apache-2.0"
dependencies = [
    "open-autonomy==0.21.16",
    "open-aea-test-autonomy==0.21.16",
    "aea-helpers==0.21.16",
    "open-aea==2.1.0",
    "open-aea-ledger-ethereum==2.1.0",
    "open-aea-ledger-cosmos==2.1.0",
    "typing_extensions<=4.15.0,>=3.10.0.2",
    "toml==0.10.2",
    "gql==3.5.0",
    "grpcio==1.78.0",
    "asn1crypto<1.5.0,>=1.4.0",
    "py-ecc==8.0.0",
    "pytz==2022.2.1",
    "openapi-core==0.22.0",
    "openapi-spec-validator<0.8.0,>=0.7.0",
    "jsonschema<5.0.0,>=4.23.0",
    "hypothesis==6.21.6",
    "requests<2.33.0,>=2.28.1",
    "pyinstaller==6.19.0",
    "pycoingecko==3.2.0",
    "numpy>=2.2.6",
    "pandas>=2.2.3",
    "peewee==3.17.5",
    "google-generativeai==0.8.2",
    "w3multicall>=0.3.1",
    "pydantic<3,>=2.11.9",
    "multiaddr==0.0.9",
    "protobuf<6,>=5",
    "pycryptodome==3.20.0",
    "certifi>=2025.1.31",
    "hexbytes",
    "pip>=24.0",
]

[project.urls]
Repository = "https://github.com/valory-xyz/optimus"

[dependency-groups]
dev = [
    "tomte[cli, tests]==0.6.2",
]

[tool.uv]
default-groups = "all"
prerelease = "allow"

[tool.uv.build-backend]
module-name = ["packages"]
module-root = ""
