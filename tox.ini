[Authorized Packages]
; open-autonomy wheel metadata reports "Other/Proprietary"; actual license is Apache-2.0.
open-autonomy: ==0.21.20
; anchorpy / based58 / jsonalias: transitive deps via open-aea-ledger-solana
; (added by open-autonomy 0.21.20). All three ship under MIT per their
; GitHub repos but expose no PyPI License field, so PARANOID liccheck
; reports them UNKNOWN.
anchorpy: 0.20.2
based58: 0.1.1
jsonalias: 0.1.1
; httpx: pulled in via solana << anchorpy. uv resolves a 1.0.dev* build
; under prerelease = "allow"; that build's metadata ships no License field.
; httpx is BSD-3-Clause upstream. liccheck parses this block with
; `semantic_version` (SemVer), not PEP 440 — the pre-release suffix here
; is `-dev` (SemVer), not `.dev0` (PEP 440); the canonical PEP 440 form
; is rejected with `ValueError: Invalid simple block`.
httpx: >=1.0.0-dev,<2
; numpy compound license (BSD-3 + 0BSD + MIT + Zlib + CC0); permissive.
numpy: *
; pyinstaller / pyinstaller-hooks-contrib are GPLv2 build tools (not
; distributed with the software).
pyinstaller: *
pyinstaller-hooks-contrib: *
