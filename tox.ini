; By default, testenvs are configured to:
; - don't skip dist (skipsdist = False)
; - don't skip the package installation (skip_install = False)
; - don't use source installation (usedevelop = False)
; where one of those steps is not necessary for the test,
; we set the associated flag (e.g. for linting we don't need
; the package installation).
[tox]
envlist = bandit, safety, black, black-check, isort, isort-check, check-hash, check-packages, check-dependencies, flake8, mypy, pylint, darglint, check-generate-all-protocols, abci-docstrings, check-abci-docstrings, check-abciapp-specs, check-handlers, py{3.10,3.11,3.12,3.13,3.14}-{win,linux,darwin}
; when running locally we don't want to fail for no good reason
skip_missing_interpreters = true
isolated_build = True
uv_seed = true

[deps-tests]
deps =
    pip
    tomte[tests]==0.6.5

[deps-packages]
deps =
    {[deps-tests]deps}
    aiohttp<4.0.0,>=3.8.5
    asn1crypto<1.5.0,>=1.4.0
    Authlib==1.2.0
    certifi==2026.2.25
    gql==3.5.0
    grpcio==1.78.0
    hypothesis==6.21.6
    jsonschema<5.0.0,>=4.23.0
    open-autonomy[all]==0.21.19
    open-aea==2.2.1
    open-aea-ledger-ethereum==2.2.1
    open-aea-ledger-cosmos==2.2.1
    open-aea-cli-ipfs==2.2.1
    open-aea-test-autonomy==0.21.19
    open-aea-helpers==0.21.19
    typing_extensions==4.15.0
    py-ecc==8.0.0
    pytz==2022.2.1
    pytest==8.4.2
    openapi-core==0.22.0
    openapi-spec-validator==0.7.2
    pydantic==2.13.0b3
    w3multicall==0.3.1
    requests==2.32.5
    pycoingecko==3.2.0
    google-generativeai==0.8.2
    peewee==3.17.5
    click<9,>=8.1.0
    multiaddr==0.0.9
    setuptools<=81.0.0
    httpx<1,>=0.23.0
    protobuf<6,>=5
    pycryptodome==3.20.0
    hexbytes==2.0.0b1

[extra-deps]
deps =
    PyYAML<=6.0.1,>=3.10
    attrs
    black
    ecdsa>=0.15
    eth-abi==5.2.0
    eth-account<0.14.0,>=0.13.0
    eth-utils==5.3.0
    eth_abi==5.2.0
    eth_account<1.0.0,>=0.8.0
    eth_typing
    eth_utils
    gql==3.5.0
    hexbytes
    ipfshttpclient==0.8.0a2
    isort
    multidict
    numpy==2.2.6
    openai==1.55.3
    packaging
    pandas>=2.2.3
    peewee==3.17.5
    protobuf<6,>=5
    py-eth-sig-utils
    pycoingecko==3.2.0
    pycryptodome==3.20.0
    pydantic<3,>=2.11.9
    pyinstaller==6.19.0
    pytest-asyncio
    pyyaml<7.0.0,>=6.0.0
    requests<2.33.0,>=2.28.1
    typing-extensions>=4.13.2
    web3<8,>=7.0.0
    werkzeug
; end-extra

