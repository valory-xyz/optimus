; Local extensions to tomte's canonical tox.ini. Consumed by `tomte tox`.

[tomte-extensions]
; Most runtime deps auto-mirror from [project].dependencies. Listed here
; are range-form overrides for runtime deps where the package YAML uses
; a range expression — `aea-helpers check-dependencies` does
; string-strict matching so the form must agree on both sides. Plus
; lint-only werkzeug/attrs not in pyproject.
extra_deps =
    protobuf<6,>=5
    web3<8,>=7.0.0
    aiohttp<4.0.0,>=3.8.5
    asn1crypto<1.5.0,>=1.4.0
    py-ecc<10,>=8
    websocket_client<1,>=0.32.0
    openapi-spec-validator<0.8.0,>=0.7.0
    jsonschema<5.0.0,>=4.23.0
    werkzeug==3.1.6
    attrs==25.4.0
    pytest-asyncio>=1.3
    ecdsa>=0.15
    multidict
    typing_extensions<=4.15.0,>=3.10.0.2
    typing-extensions<=4.15.0,>=3.10.0.2
    eth-account
    eth_account
    eth_abi
    eth_utils
    httpx

[pytest]
; Opt in to tomte's canonical pytest defaults (integration/e2e markers,
; aea.* DeprecationWarning filter). Plugin is silent without this flag so
; non-fleet `tomte[black]` consumers don't get unexpected config injection.
tomte_defaults = true
; anchorpy 0.20.2 (pulled transitively via open-aea-ledger-solana since
; open-autonomy 0.21.20) ships a pytest plugin with a broken import that
; crashes pytest collection. Disable its pytest11 entry point.
addopts = -p no:pytest_anchorpy

[mypy]
warn_unused_ignores = False
warn_redundant_casts = False
disable_error_code = redundant-cast,unused-ignore

; Issue-280 (P0–P4) resilience PRs landed on `main` via #284 / #285
; without the slim canonical's `--disallow-untyped-defs` enforcement
; (main's CI still runs the legacy hand-written `tox.ini`). The new
; behaviours / pools / states / customs / tests modules below carry
; ~500 untyped-def errors as a result. Retrofitting type hints across
; that surface is out of scope for this dep-bump PR — tracked as a
; follow-up to land alongside the wave-2a migration.
[mypy-packages.valory.skills.liquidity_trader_abci.behaviours.*]
ignore_errors = True

[mypy-packages.valory.skills.liquidity_trader_abci.pools.*]
ignore_errors = True

[mypy-packages.valory.skills.liquidity_trader_abci.states.*]
ignore_errors = True

[mypy-packages.valory.skills.liquidity_trader_abci.tests.*]
